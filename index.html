<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | Python E-Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #47a1eb;
            --secondary: #ffd43b;
            --bg: #020617;
            --glass: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Sarabun', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(2, 6, 23, 0.7), rgba(2, 6, 23, 0.7)), 
                        url('https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            color: white;
            overflow: hidden;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
        }

        .form-box { display: none; }
        .form-box.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        h2 { color: var(--primary); margin-bottom: 10px; font-size: 1.8em; }
        p.subtitle { color: #94a3b8; margin-bottom: 25px; font-size: 0.9em; }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; color: #cbd5e1; font-size: 0.85em; }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: rgba(15, 23, 42, 0.8);
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); }

        .btn-main {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1em;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-main:hover { background: #3b82f6; }

        .switch-text {
            margin-top: 20px;
            font-size: 0.9em;
            color: #94a3b8;
        }

        .switch-text span {
            color: var(--secondary);
            cursor: pointer;
            text-decoration: underline;
        }

        .msg { font-size: 0.85em; margin-top: 10px; display: none; }
        .error { color: #ef4444; }
        .success { color: #22c55e; }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-form" class="form-box active">
            <h2>ยินดีต้อนรับกลับ</h2>
            <p class="subtitle">กรุณาเข้าสู่ระบบเพื่อเริ่มการเรียนรู้</p>
            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>ชื่อผู้ใช้งาน</label>
                    <input type="text" id="login-user" required placeholder="Username">
                </div>
                <div class="input-group">
                    <label>รหัสผ่าน</label>
                    <input type="password" id="login-pass" required placeholder="Password">
                </div>
                <button type="submit" class="btn-main">เข้าสู่ระบบ</button>
            </form>
            <p id="login-msg" class="msg error">❌ ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</p>
            <p class="switch-text">ยังไม่มีบัญชี? <span onclick="switchForm('signup-form')">สมัครสมาชิกที่นี่</span></p>
        </div>

        <div id="signup-form" class="form-box">
            <h2>สร้างบัญชีใหม่</h2>
            <p class="subtitle">สมัครสมาชิกเพื่อเข้าถึงบทเรียนทั้งหมด</p>
            <form onsubmit="handleSignUp(event)">
                <div class="input-group">
                    <label>ชื่อผู้ใช้งาน</label>
                    <input type="text" id="reg-user" required placeholder="สร้าง Username">
                </div>
                <div class="input-group">
                    <label>รหัสผ่าน</label>
                    <input type="password" id="reg-pass" required placeholder="สร้าง Password">
                </div>
                <div class="input-group">
                    <label>ยืนยันรหัสผ่าน</label>
                    <input type="password" id="reg-confirm" required placeholder="Confirm Password">
                </div>
                <button type="submit" class="btn-main" style="background: var(--secondary); color: #000;">สมัครสมาชิก</button>
            </form>
            <p id="signup-msg" class="msg"></p>
            <p class="switch-text">มีบัญชีอยู่แล้ว? <span onclick="switchForm('login-form')">เข้าสู่ระบบ</span></p>
        </div>
    </div>

    <script>
        // ฟังก์ชันสลับหน้าจอ Login / Sign Up
        function switchForm(formId) {
            document.querySelectorAll('.form-box').forEach(f => f.classList.remove('active'));
            document.getElementById(formId).classList.add('active');
            document.querySelectorAll('.msg').forEach(m => m.style.display = 'none');
        }

        // ระบบสมัครสมาชิก
        function handleSignUp(e) {
            e.preventDefault();
            const user = document.getElementById('reg-user').value;
            const pass = document.getElementById('reg-pass').value;
            const confirm = document.getElementById('reg-confirm').value;
            const msg = document.getElementById('signup-msg');

            if (pass !== confirm) {
                msg.innerText = "❌ รหัสผ่านไม่ตรงกัน!";
                msg.className = "msg error";
                msg.style.display = "block";
                return;
            }

            // ดึงข้อมูลผู้ใช้ทั้งหมดจาก localStorage
            let users = JSON.parse(localStorage.getItem('python_users')) || [];

            // ตรวจสอบว่าชื่อซ้ำไหม
            if (users.find(u => u.username === user)) {
                msg.innerText = "❌ ชื่อผู้ใช้นี้ถูกใช้ไปแล้ว!";
                msg.className = "msg error";
                msg.style.display = "block";
                return;
            }

            // บันทึกข้อมูล
            users.push({ username: user, password: pass });
            localStorage.setItem('python_users', JSON.stringify(users));

            msg.innerText = "✅ สมัครสมาชิกสำเร็จ! กำลังไปหน้าล็อกอิน...";
            msg.className = "msg success";
            msg.style.display = "block";

            setTimeout(() => switchForm('login-form'), 2000);
        }

        // ระบบล็อกอิน
        function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const msg = document.getElementById('login-msg');

            let users = JSON.parse(localStorage.getItem('python_users')) || [];
            
            // เพิ่มบัญชี admin เริ่มต้นให้กรณีที่ไม่มีใครสมัครเลย
            if (users.length === 0) {
                users.push({username: 'admin', password: '1234'});
                localStorage.setItem('python_users', JSON.stringify(users));
            }

            const foundUser = users.find(u => u.username === user && u.password === pass);

            if (foundUser) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('currentUser', user);
                window.location.href = 'Home.html';
            } else {
                msg.style.display = "block";
                // สั่นการ์ด
                document.querySelector('.container').animate([
                    { transform: 'translateX(-5px)' }, { transform: 'translateX(5px)' }, { transform: 'translateX(0)' }
                ], { duration: 200, iterations: 2 });
            }
        }
    </script>
</body>
</html>
